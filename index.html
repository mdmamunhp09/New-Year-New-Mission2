<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New-Year-New-Mission</title>
    <link rel="stylesheet" href="styles/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Merriweather:ital,opsz,wght@0,18..144,300..900;1,18..144,300..900&display=swap"
        rel="stylesheet">
</head>

<body>
    <!--Header Section Start-->
    <header class="banner merriweather">
        <div class="banner-content">
            <h4 class="banner-title">Happy New Year</h4>
            <h2 class="banner-description">New Year Party <br> Celebration</h2>
        </div>
    </header>
    <main>
        <!--discount section Start-->
        <section class="discount-container inter">
            <h1 class="off-title">65% OFF</h1>
            <h4 class="off-for-title">OUR HOLIDAY DEALS ARE BETTER</h4>
            <h3 class="category-title">ALL CATEGORIES</h3>
            <img src="images/New Year Photo.png" alt="">
        </section>
        <!--mid night party start-->
        <section class="mid-party-container merriweather ">
            <div class="mid-column">
                <h3 class="mid-party-title">Welcome to <br> midnight party</h3>
                <p class="mid-party-description">Dolor sit amet consectetur. Consequat eget consectetur maecenas sed
                    molestie malesuada. Ipsum sed sodales risus ut pellentesque vel euismod. </p>
                <button class="mid-party-button">Join Now</button>
            </div>
            <div class="mid-column">
                <img class="mid-img" src="images/Group 70.png" alt="">
            </div>
        </section>

    </main>
</body>

</html>
